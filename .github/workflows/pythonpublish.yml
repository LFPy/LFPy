name: Upload Python Package

on:
  release:
    types: [created]

permissions:
  contents: read

jobs:
  build_wheels:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            cibw_archs: x86_64 aarch64
          - os: macos-13
            cibw_archs: x86_64
          - os: macos-14
            cibw_archs: arm64
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - name: Set up QEMU
      if: runner.os == 'Linux'
      uses: docker/setup-qemu-action@v3
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"
    - name: Install build tools
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install cibuildwheel>=3.1.0
    - name: Build wheels
      shell: bash
      env:
        CIBW_BUILD: cp310-* cp311-* cp312-* cp313-* cp314-*
        CIBW_ARCHS: ${{ matrix.cibw_archs }}
      run: |
        python -m cibuildwheel --output-dir wheelhouse
    - name: Upload wheels
      uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.os }}
        path: ./wheelhouse/*.whl

  build_sdist:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"
    - name: Install build tools
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install poetry
    - name: Build source distribution
      shell: bash
      run: |
        poetry build --format sdist
    - name: Upload sdist
      uses: actions/upload-artifact@v4
      with:
        name: sdist
        path: dist/*.tar.gz

  publish:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest

    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"
    - name: Install twine
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install twine
    - name: Download artifacts
      uses: actions/download-artifact@v4.1.3
      with:
        path: dist
        merge-multiple: true
    - name: Publish to Test PYPI
      shell: bash
      run: |
        twine upload -u __token__ -p ${{ secrets.GH_TESTPYPI_LFPY_TOKEN }} --repository-url https://test.pypi.org/legacy/ dist/* --verbose
    - name: Publish to PYPI
      shell: bash
      run: |
        twine upload -u __token__ -p ${{ secrets.GH_PYPI_LFPY_TOKEN }} dist/* --verbose
